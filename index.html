<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐟 LinkedFin</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #0a0a0a;
      color: #fafafa;
    }
    h1 { font-size: 2.5rem; }
    .search-container {
      position: relative;
      margin-bottom: 1rem;
    }
    .search-container input {
      width: 100%;
      padding: 0.75rem;
      padding-right: 2.5rem;
      font-size: 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      color: #fafafa;
      box-sizing: border-box;
    }
    .search-container .clear-btn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 0.25rem;
      line-height: 1;
      display: none;
    }
    .search-container .clear-btn:hover { color: #fff; }
    .search-container.has-value .clear-btn { display: block; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      text-align: left;
      padding: 0.5rem;
      border-bottom: 1px solid #333;
    }
    th { color: #888; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #1a1a1a; }
    #status { color: #888; margin-bottom: 1rem; }

    /* Detail modal */
    #detail {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 600px;
      width: 90%;
      color: #fafafa;
      position: relative;
    }
    #detail::backdrop {
      background: rgba(0, 0, 0, 0.75);
    }
    #detail h2 { margin: 0 0 0.25rem 0; font-size: 1.75rem; }
    #detail .scientific { color: #888; font-style: italic; margin-bottom: 1rem; }
    #detail .etymology {
      background: #252525;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    #detail .notes {
      color: #999;
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 1rem;
      padding-left: 1rem;
      border-left: 2px solid #333;
    }
    #detail .evolution {
      margin-bottom: 1rem;
    }
    #detail .evolution h3 {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #detail .evolution-chain {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.5rem 0;
    }
    #detail .evolution-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: #252525;
      border-radius: 4px;
      cursor: pointer;
      min-width: 80px;
      text-align: center;
      border: 2px solid transparent;
    }
    #detail .evolution-item:hover { background: #333; }
    #detail .evolution-item.current { border-color: #666; background: #333; }
    #detail .evolution-item .name { font-weight: 500; font-size: 0.9rem; }
    #detail .evolution-item .size { color: #888; font-size: 0.75rem; margin-top: 0.25rem; }
    #detail .evolution-arrow { color: #666; font-size: 1.25rem; }
    #detail .alternates { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }
    #detail .borrowed { color: #888; font-size: 0.9rem; margin-top: 0.5rem; }
    #detail .confused { color: #f59e0b; font-size: 0.9rem; margin-top: 0.5rem; }
    #detail .alt-link { color: #4ade80; cursor: pointer; }
    #detail .alt-link:hover { text-decoration: underline; }
    #detail .meta { color: #666; font-size: 0.875rem; margin-bottom: 1rem; }
    #detail .meta span { margin-right: 1rem; }
    #detail .fields {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.25rem 1rem;
      background: #252525;
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    #detail .fields dt { color: #666; }
    #detail .fields dd { margin: 0; font-family: monospace; }
    #detail .fields .ipa { font-family: "Doulos SIL", "Charis SIL", "Gentium", serif; font-size: 1rem; }
    #detail .related { margin-top: 1.5rem; }
    #detail .related h3 { font-size: 0.875rem; color: #888; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    #detail .related-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    #detail .related-item {
      background: #252525;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      border: 1px solid transparent;
    }
    #detail .related-item:hover { background: #333; border-color: #444; }
    #detail .related-item.current { border-color: #666; }
    #detail .related-item .region { color: #666; font-size: 0.75rem; display: block; }
    #detail .dialog-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    #detail .dialog-actions button {
      background: none;
      border: none;
      color: #666;
      font-size: 1.25rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.25rem;
    }
    #detail .dialog-actions button:hover { color: #fff; }
    #detail .share.copied { color: #4ade80; }
  </style>
</head>
<body>
  <h1>🐟 LinkedFin</h1>
  <p><em>A so<strong>fish</strong>ticated database for fish names and their etymologies across cultures</em></p>

  <div id="status">Loading database...</div>

  <dialog id="detail">
    <div class="dialog-actions">
      <button class="share" onclick="copyLink()" title="Copy link">🔗</button>
      <button class="close" onclick="closeDetail()" autofocus>×</button>
    </div>
    <h2 id="detail-name"></h2>
    <div class="scientific" id="detail-scientific"></div>
    <div class="meta">
      <span id="detail-id"></span>
      <span id="detail-region"></span>
    </div>
    <div class="fields" id="detail-fields"></div>
    <div class="etymology" id="detail-etymology"></div>
    <div class="notes" id="detail-notes"></div>
    <div class="evolution" id="detail-evolution"></div>
    <div class="related">
      <h3>Same species, different names</h3>
      <div class="related-list" id="detail-related"></div>
    </div>
  </dialog>

  <div class="search-container" id="search-container">
    <input type="text" id="search" placeholder="Search by name, species, region, or language (e.g., ahven, salmo, finland, finnish)" disabled />
    <button class="clear-btn" onclick="clearSearch()" title="Clear">×</button>
  </div>

  <table id="results">
    <thead>
      <tr>
        <th>Name</th>
        <th>Transliteration</th>
        <th>Region</th>
        <th>Species</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module">
    import sqlite3InitModule from 'https://esm.sh/@sqlite.org/sqlite-wasm@3.51.2-build6';
    import Fuse from 'https://esm.sh/fuse.js@7.1.0';

    let db;
    let fuse;
    let allNames = [];
    let allRelations = [];

    async function init() {
      const status = document.getElementById('status');
      const search = document.getElementById('search');

      try {
        status.textContent = 'Loading SQLite WASM...';
        const sqlite3 = await sqlite3InitModule();

        status.textContent = 'Fetching database...';
        const response = await fetch('/fish.db');
        const arrayBuffer = await response.arrayBuffer();
        const bytes = new Uint8Array(arrayBuffer);

        status.textContent = 'Initializing database...';
        const p = sqlite3.wasm.allocFromTypedArray(bytes);
        db = new sqlite3.oo1.DB();
        sqlite3.capi.sqlite3_deserialize(
          db.pointer,
          'main',
          p,
          bytes.length,
          bytes.length,
          sqlite3.capi.SQLITE_DESERIALIZE_FREEONCLOSE |
            sqlite3.capi.SQLITE_DESERIALIZE_READONLY
        );

        // Load all names for fuzzy search
        allNames = db.exec({
          sql: `SELECT n.id, n.name, n.lang, n.transliteration, n.phonetic,
                       n.etymology, n.measurement_unit, n.measurement_min, n.measurement_max,
                       n.species_id, r.name as region, s.scientific_name, s.notes as species_notes
                FROM names n
                JOIN species s ON n.species_id = s.id
                JOIN regions r ON n.region_id = r.id
                ORDER BY n.name`,
          returnValue: 'resultRows',
          rowMode: 'object'
        });

        // Add language display names for search
        const langNames = { tur: 'Turkish', ell: 'Greek', arb: 'Standard Arabic', arz: 'Egyptian Arabic', apc: 'Levantine Arabic', eng: 'English', lat: 'Latin', fin: 'Finnish', swe: 'Swedish', est: 'Estonian', sme: 'Northern Sami' };
        allNames = allNames.map(n => ({ ...n, language: langNames[n.lang] || n.lang }));

        // Load all relations
        allRelations = db.exec({
          sql: `SELECT source_id, target_id, relation FROM name_relations`,
          returnValue: 'resultRows',
          rowMode: 'object'
        });

        // Initialize Fuse.js for fuzzy search
        fuse = new Fuse(allNames, {
          keys: [
            { name: 'name', weight: 1 },
            { name: 'transliteration', weight: 0.8 },
            { name: 'phonetic', weight: 0.6 },
            { name: 'scientific_name', weight: 0.5 },
            { name: 'region', weight: 0.4 },
            { name: 'language', weight: 0.4 },
          ],
          threshold: 0.4,
          distance: 100,
          includeScore: true,
          ignoreLocation: true,
        });

        status.textContent = `Ready! ${allNames.length} names loaded.`;
        search.disabled = false;
        search.focus();

        render(allNames);
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }

    function render(rows) {
      const tbody = document.querySelector('#results tbody');
      tbody.innerHTML = rows.map(row => {
        const item = row.item || row;
        return `
          <tr onclick="showDetail('${item.id}')">
            <td>${item.name}</td>
            <td>${item.transliteration || ''}</td>
            <td>${item.region}</td>
            <td><em>${item.scientific_name}</em></td>
          </tr>
        `;
      }).join('');
    }

    // Build chain from relations of a specific type
    function buildChain(nameId, relationType) {
      const relations = allRelations.filter(r => r.relation === relationType);

      // Find all names in the same chain
      const inChain = new Set();
      const toCheck = [nameId];

      // Traverse both directions to find all connected names
      while (toCheck.length > 0) {
        const current = toCheck.pop();
        if (inChain.has(current)) continue;
        inChain.add(current);

        // Find relations where this name is source or target
        for (const rel of relations) {
          if (rel.source_id === current && !inChain.has(rel.target_id)) {
            toCheck.push(rel.target_id);
          }
          if (rel.target_id === current && !inChain.has(rel.source_id)) {
            toCheck.push(rel.source_id);
          }
        }
      }

      if (inChain.size <= 1) return [];

      // For directional relations (smaller_than), find start and order
      if (relationType === 'smaller_than') {
        const hasIncoming = new Set(relations.filter(r => inChain.has(r.target_id)).map(r => r.target_id));
        let smallest = [...inChain].find(id => !hasIncoming.has(id));

        const chain = [];
        let current = smallest;
        while (current) {
          chain.push(current);
          const next = relations.find(r => r.source_id === current);
          current = next ? next.target_id : null;
        }
        return chain;
      }

      // For bidirectional relations, just return the set
      return [...inChain];
    }

    function doSearch(term) {
      if (!term) {
        render(allNames);
        return;
      }
      const results = fuse.search(term);
      render(results);
    }

    // Make showDetail global
    window.showDetail = function(id) {
      const item = allNames.find(n => n.id === id);
      if (!item) return;

      document.getElementById('detail-name').textContent = item.name;
      document.getElementById('detail-scientific').textContent = item.scientific_name;
      document.getElementById('detail-id').textContent = `#${item.id}`;
      document.getElementById('detail-region').textContent = `📍 ${item.region}`;

      // Build fields grid
      const fieldsEl = document.getElementById('detail-fields');
      let fieldsHtml = '';

      // ISO 639-3 to language name
      const langNames = { tur: 'Turkish', ell: 'Greek', arb: 'Standard Arabic', arz: 'Egyptian Arabic', apc: 'Levantine Arabic', eng: 'English', lat: 'Latin', fin: 'Finnish', swe: 'Swedish', est: 'Estonian', sme: 'Northern Sami' };
      if (item.lang) {
        fieldsHtml += `<dt>Language</dt><dd>${langNames[item.lang] || item.lang}</dd>`;
      }
      if (item.measurement_unit) {
        const max = item.measurement_max ? item.measurement_max : '∞';
        fieldsHtml += `<dt>Measurement</dt><dd>${item.measurement_min} – ${max} ${item.measurement_unit}</dd>`;
      }
      if (item.transliteration) {
        fieldsHtml += `<dt>Transliteration</dt><dd>${item.transliteration}</dd>`;
      }
      if (item.phonetic && !item.phonetic.startsWith('[')) {
        fieldsHtml += `<dt>IPA</dt><dd><span class="ipa">${item.phonetic}</span></dd>`;
      }

      fieldsEl.innerHTML = fieldsHtml;
      fieldsEl.style.display = fieldsHtml ? 'grid' : 'none';

      // Etymology
      const etymEl = document.getElementById('detail-etymology');
      etymEl.textContent = item.etymology || 'Etymology unknown.';

      // Species notes
      const notesEl = document.getElementById('detail-notes');
      if (item.species_notes) {
        notesEl.textContent = item.species_notes;
        notesEl.style.display = 'block';
      } else {
        notesEl.style.display = 'none';
      }

      // Relations section
      const evolutionEl = document.getElementById('detail-evolution');
      let evolutionHtml = '';

      // Size progression chain
      const sizeChain = buildChain(id, 'smaller_than');
      if (sizeChain.length > 1) {
        evolutionHtml += '<h3>Progression</h3><div class="evolution-chain">';
        sizeChain.forEach((nameId, i) => {
          const n = allNames.find(x => x.id === nameId);
          if (!n) return;
          const sizeText = n.measurement_unit
            ? `${n.measurement_min}–${n.measurement_max || '∞'} ${n.measurement_unit}`
            : '';
          evolutionHtml += `
            <div class="evolution-item ${n.id === id ? 'current' : ''}" onclick="showDetail('${n.id}')">
              <span class="name">${n.name}</span>
              <span class="size">${sizeText}</span>
            </div>
          `;
          if (i < sizeChain.length - 1) {
            evolutionHtml += '<span class="evolution-arrow">→</span>';
          }
        });
        evolutionHtml += '</div>';
      }

      // Alternates
      const alternates = buildChain(id, 'alternate_of');
      if (alternates.length > 1) {
        const others = alternates.filter(nid => nid !== id);
        const otherNames = others.map(nid => {
          const n = allNames.find(x => x.id === nid);
          return n ? `<span class="alt-link" onclick="showDetail('${n.id}')">${n.name}</span>` : '';
        }).join(', ');
        evolutionHtml += `<div class="alternates">Alternates: ${otherNames}</div>`;
      }

      // Borrowed from (this name borrowed from another language)
      const borrowedFrom = allRelations.filter(r => r.relation === 'borrowed_from' && r.source_id === id);
      if (borrowedFrom.length > 0) {
        const sources = borrowedFrom.map(rel => {
          const n = allNames.find(x => x.id === rel.target_id);
          return n ? `<span class="alt-link" onclick="showDetail('${n.id}')">${n.name}</span>` : '';
        }).join(', ');
        evolutionHtml += `<div class="borrowed">Borrowed from: ${sources}</div>`;
      }

      // Lent to (this name was borrowed by other languages)
      const lentTo = allRelations.filter(r => r.relation === 'borrowed_from' && r.target_id === id);
      if (lentTo.length > 0) {
        const borrowers = lentTo.map(rel => {
          const n = allNames.find(x => x.id === rel.source_id);
          return n ? `<span class="alt-link" onclick="showDetail('${n.id}')">${n.name}</span>` : '';
        }).join(', ');
        evolutionHtml += `<div class="borrowed">Lent to: ${borrowers}</div>`;
      }

      // Confused with (different species, same/similar name)
      const confusedWith = allRelations.filter(r =>
        r.relation === 'confused_with' && (r.source_id === id || r.target_id === id)
      );
      if (confusedWith.length > 0) {
        const confused = confusedWith.map(rel => {
          const otherId = rel.source_id === id ? rel.target_id : rel.source_id;
          const n = allNames.find(x => x.id === otherId);
          if (!n) return '';
          const species = allNames.find(x => x.id === otherId);
          return `<span class="alt-link" onclick="showDetail('${n.id}')">${n.name}</span> (${n.scientific_name})`;
        }).join(', ');
        evolutionHtml += `<div class="confused">⚠️ Often confused with: ${confused}</div>`;
      }

      evolutionEl.innerHTML = evolutionHtml;
      evolutionEl.style.display = evolutionHtml ? 'block' : 'none';

      // Related names (same species)
      const related = allNames.filter(n => n.species_id === item.species_id);
      const relatedEl = document.getElementById('detail-related');
      relatedEl.innerHTML = related.map(r => `
        <div class="related-item ${r.id === id ? 'current' : ''}" onclick="showDetail('${r.id}')">
          ${r.name}
          <span class="region">${r.region}</span>
        </div>
      `).join('');

      document.getElementById('detail').showModal();
      history.pushState(null, '', `#name/${id}`);
    }

    window.closeDetail = function() {
      document.getElementById('detail').close();
    }

    window.copyLink = function() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.querySelector('#detail .share');
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.textContent = '🔗';
        }, 1500);
      });
    }

    // Close on backdrop click
    document.getElementById('detail').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeDetail();
    });

    // Clear hash when dialog closes (ESC key, etc.)
    document.getElementById('detail').addEventListener('close', () => {
      if (location.hash) history.pushState(null, '', location.pathname);
    });

    // Handle hash routing
    function handleHash() {
      const hash = location.hash.slice(1); // remove #
      if (!hash) return;

      const [type, id] = hash.split('/');
      if (type === 'name' && id) {
        // Wait for data to load if needed
        if (allNames.length > 0) {
          showDetail(id);
        } else {
          // Retry after init
          setTimeout(() => handleHash(), 100);
        }
      }
      // Future: handle species, region, lang
    }

    window.addEventListener('hashchange', handleHash);

    const searchInput = document.getElementById('search');
    const searchContainer = document.getElementById('search-container');

    searchInput.addEventListener('input', (e) => {
      const value = e.target.value;
      searchContainer.classList.toggle('has-value', value.length > 0);
      doSearch(value);
    });

    window.clearSearch = function() {
      searchInput.value = '';
      searchContainer.classList.remove('has-value');
      doSearch('');
      searchInput.focus();
    }

    init().then(() => handleHash());
  </script>
</body>
</html>
